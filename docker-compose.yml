version: '3.8'

services:
  student-query:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./students.csv:/app/students.csv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3